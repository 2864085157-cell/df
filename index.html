<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极简东方弹幕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #game { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; background: #0a0a0a; }
        
        /* 标题页 */
        #title {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
        }
        #title h1 {
            font-size: 2.8rem;
            margin-bottom: 3rem;
            color: #ff3333;
            text-shadow: 0 0 15px #ff0000;
        }
        .option {
            margin: 1rem 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .option input { width: 1.2rem; height: 1.2rem; }
        #start {
            margin-top: 2.5rem;
            padding: 1rem 3rem;
            font-size: 1.4rem;
            background: #ff3333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        #start:hover { transform: scale(1.05); background: #ff5555; }
        
        /* 死亡页 */
        #death {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #death-text {
            font-size: 9rem;
            color: #ff0000;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        #restart {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        /* 大招按钮 */
        #ultimate {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(255, 100, 0, 0.85);
            color: #fff;
            border: 3px solid #ff6600;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 50;
            display: none;
        }
        #ultimate:disabled {
            background: rgba(100, 100, 100, 0.5);
            border-color: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="canvas"></canvas>
        
        <div id="title">
            <h1>极简东方弹幕</h1>
            <div class="option">
                <input type="checkbox" id="cheat">
                <label for="cheat">开启作弊模式 (无限大招+无限命)</label>
            </div>
            <div class="option">
                <input type="checkbox" id="hitbox" checked>
                <label for="hitbox">显示判定点</label>
            </div>
            <button id="start">开始游戏</button>
        </div>
        
        <div id="death">
            <div id="death-text">菜</div>
            <button id="restart">重新开始</button>
        </div>
        
        <button id="ultimate">神拳</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const title = document.getElementById('title');
        const death = document.getElementById('death');
        const startBtn = document.getElementById('start');
        const restartBtn = document.getElementById('restart');
        const ultimateBtn = document.getElementById('ultimate');
        const cheatCheck = document.getElementById('cheat');
        const hitboxCheck = document.getElementById('hitbox');

        // 画布自适应
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 游戏全局状态
        let running = false;
        let cheatMode = false;
        let showHitbox = true;
        let score = 0;
        let invincible = false;
        let invincibleTimer = 0;

        // 生命系统
        let lives = 3;
        let maxLives = 4;
        let lifeTimer = 0;
        const lifeInterval = 1800; // 每30秒加一条命

        // 大招能量系统
        let energy = 0;
        const maxEnergy = 100;
        const normalEnemyEnergy = 10; // 普通小怪加10能量
        const eliteEnemyEnergy = 25; // 精英怪加25能量

        // BOSS系统 (还原为2分钟刷新一次)
        let boss = null;
        let bossActive = false;
        let bossTimer = 0;
        const bossInterval = 7200; // 2分钟 (60fps)
        let bossDefeated = 0;

        // 3个不同的BOSS模板
        const bossTypes = [
            {
                name: "红魔馆门卫",
                hp: 600,
                maxHp: 600,
                color: "#ff4444",
                r: 30,
                attacks: ["ringBarrage", "scatterStorm", "trackingSalvo"],
                phases: [0.7, 0.3]
            },
            {
                name: "雾之湖妖精",
                hp: 850,
                maxHp: 850,
                color: "#44aaff",
                r: 28,
                attacks: ["spiralDeath", "crossBurst", "waveWall"],
                phases: [0.6, 0.2]
            },
            {
                name: "地狱鸦使者",
                hp: 1200,
                maxHp: 1200,
                color: "#ffaa00",
                r: 32,
                attacks: ["laserBeam", "explosiveRing", "chaosBullet"],
                phases: [0.5, 0.15]
            }
        ];

        // 玩家 (东方标准判定点: 2px)
        const player = {
            x: 0,
            y: 0,
            visualR: 14,
            hitboxR: 2,
            dragging: false,
            fireTimer: 0,
            fireRate: 7 // 射速提升
        };

        // 游戏对象池
        let enemies = [];
        let bullets = [];
        let playerBullets = [];
        let particles = [];

        // 8种普通敌人类型 (难度提升)
        const enemyTypes = {
            normal: { r: 11, color: '#44ff44', hp: 1, speed: 1.6, fireRate: 95, attack: 'straight' },
            scatter: { r: 9, color: '#ffff44', hp: 1, speed: 3.2, fireRate: 75, attack: 'scatter3' },
            spiral: { r: 19, color: '#4444ff', hp: 4, speed: 0.9, fireRate: 140, attack: 'spiral' },
            tracker: { r: 10, color: '#ff44ff', hp: 3, speed: 1.4, fireRate: 120, attack: 'tracking' },
            ring: { r: 13, color: '#00ffff', hp: 3, speed: 1.2, fireRate: 160, attack: 'ring5' },
            cross: { r: 12, color: '#ff8800', hp: 3, speed: 1.4, fireRate: 130, attack: 'cross' },
            delayed: { r: 11, color: '#ff00ff', hp: 2, speed: 1.5, fireRate: 180, attack: 'delayed' },
            wave: { r: 10, color: '#88ff00', hp: 2, speed: 1.7, fireRate: 110, attack: 'wave' },
            elite: { r: 16, color: '#ff0000', hp: 8, speed: 1.0, fireRate: 100, attack: 'scatter3' } // 新增精英怪
        };

        // ==================== 全新波次阵型系统 ====================
        let wave = 1;
        let waveTimer = 0;
        const waveInterval = 360; // 每6秒一波
        let currentFormation = 0;

        // 8种固定刷新阵型 (东方经典阵型复刻)
        const formations = [
            // 1. 一字长蛇阵 (顶部横排)
            {
                name: "一字阵",
                generate: (count, type) => {
                    const enemies = [];
                    const spacing = canvas.width / (count + 1);
                    for (let i = 0; i < count; i++) {
                        enemies.push({
                            x: spacing * (i + 1),
                            y: -30,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0
                        });
                    }
                    return enemies;
                }
            },
            // 2. V字阵 (两边向中间汇聚)
            {
                name: "V字阵",
                generate: (count, type) => {
                    const enemies = [];
                    const half = Math.floor(count / 2);
                    for (let i = 0; i < half; i++) {
                        enemies.push({
                            x: 50 + i * 60,
                            y: -30 - i * 20,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0
                        });
                        enemies.push({
                            x: canvas.width - 50 - i * 60,
                            y: -30 - i * 20,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0
                        });
                    }
                    if (count % 2 === 1) {
                        enemies.push({
                            x: canvas.width / 2,
                            y: -30 - half * 20,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0
                        });
                    }
                    return enemies;
                }
            },
            // 3. 左右包夹阵 (两边同时出怪)
            {
                name: "包夹阵",
                generate: (count, type) => {
                    const enemies = [];
                    const half = Math.floor(count / 2);
                    for (let i = 0; i < half; i++) {
                        enemies.push({
                            x: -20,
                            y: 50 + i * 80,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0,
                            vx: 2 // 向右移动
                        });
                        enemies.push({
                            x: canvas.width + 20,
                            y: 50 + i * 80,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0,
                            vx: -2 // 向左移动
                        });
                    }
                    return enemies;
                }
            },
            // 4. 梯形阵 (阶梯式下降)
            {
                name: "梯形阵",
                generate: (count, type) => {
                    const enemies = [];
                    for (let i = 0; i < count; i++) {
                        enemies.push({
                            x: 80 + i * 50,
                            y: -30 - i * 30,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0
                        });
                    }
                    return enemies;
                }
            },
            // 5. 环形阵 (圆形包围)
            {
                name: "环形阵",
                generate: (count, type) => {
                    const enemies = [];
                    const centerX = canvas.width / 2;
                    const radius = 150;
                    for (let i = 0; i < count; i++) {
                        const angle = i * Math.PI * 2 / count - Math.PI / 2;
                        enemies.push({
                            x: centerX + Math.cos(angle) * radius,
                            y: -50 + Math.sin(angle) * radius,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0
                        });
                    }
                    return enemies;
                }
            },
            // 6. 交叉阵 (斜向交叉)
            {
                name: "交叉阵",
                generate: (count, type) => {
                    const enemies = [];
                    const half = Math.floor(count / 2);
                    for (let i = 0; i < half; i++) {
                        enemies.push({
                            x: -20 + i * 40,
                            y: -30 - i * 20,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0,
                            vx: 1.5,
                            vy: 1.5
                        });
                        enemies.push({
                            x: canvas.width + 20 - i * 40,
                            y: -30 - i * 20,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0,
                            vx: -1.5,
                            vy: 1.5
                        });
                    }
                    return enemies;
                }
            },
            // 7. 精英带队阵 (1个精英+多个小弟)
            {
                name: "精英阵",
                generate: (count, type) => {
                    const enemies = [];
                    // 中间精英怪
                    enemies.push({
                        x: canvas.width / 2,
                        y: -50,
                        ...enemyTypes.elite,
                        fireTimer: 0,
                        angle: 0
                    });
                    // 两边小弟
                    for (let i = 0; i < count - 1; i++) {
                        enemies.push({
                            x: canvas.width / 2 + (i % 2 === 0 ? -1 : 1) * 60 * Math.ceil((i + 1) / 2),
                            y: -30 - Math.ceil((i + 1) / 2) * 25,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 50,
                            angle: 0
                        });
                    }
                    return enemies;
                }
            },
            // 8. 随机混合阵 (多种敌人混合)
            {
                name: "混合阵",
                generate: (count, types) => {
                    const enemies = [];
                    for (let i = 0; i < count; i++) {
                        const type = types[Math.floor(Math.random() * types.length)];
                        enemies.push({
                            x: Math.random() * (canvas.width - 100) + 50,
                            y: -30 - Math.random() * 100,
                            ...enemyTypes[type],
                            fireTimer: Math.random() * 80,
                            angle: 0
                        });
                    }
                    return enemies;
                }
            }
        ];

        // 波次难度配置
        function getWaveConfig(waveNum) {
            const baseCount = 3;
            const count = Math.min(baseCount + Math.floor(waveNum / 2), 12);
            const speedMultiplier = 1 + waveNum * 0.05;
            const fireRateMultiplier = Math.max(0.6, 1 - waveNum * 0.03);
            
            // 解锁敌人类型
            let availableTypes = ['normal'];
            if (waveNum >= 2) availableTypes.push('scatter');
            if (waveNum >= 4) availableTypes.push('spiral');
            if (waveNum >= 6) availableTypes.push('tracker');
            if (waveNum >= 8) availableTypes.push('ring');
            if (waveNum >= 10) availableTypes.push('cross');
            if (waveNum >= 12) availableTypes.push('delayed');
            if (waveNum >= 14) availableTypes.push('wave');
            
            // 解锁阵型
            let availableFormations = [0, 1];
            if (waveNum >= 3) availableFormations.push(2);
            if (waveNum >= 5) availableFormations.push(3, 4);
            if (waveNum >= 7) availableFormations.push(5);
            if (waveNum >= 9) availableFormations.push(6);
            if (waveNum >= 11) availableFormations.push(7);
            
            return { count, speedMultiplier, fireRateMultiplier, availableTypes, availableFormations };
        }

        // 生成一波敌人
        function spawnWave() {
            if (bossActive) return;
            
            waveTimer++;
            if (waveTimer < waveInterval) return;
            waveTimer = 0;
            
            const config = getWaveConfig(wave);
            const formationIndex = config.availableFormations[Math.floor(Math.random() * config.availableFormations.length)];
            const formation = formations[formationIndex];
            
            let newEnemies;
            if (formationIndex === 7) {
                // 混合阵用多种敌人
                newEnemies = formation.generate(config.count, config.availableTypes);
            } else {
                // 其他阵型用随机一种敌人
                const type = config.availableTypes[Math.floor(Math.random() * config.availableTypes.length)];
                newEnemies = formation.generate(config.count, type);
            }
            
            // 应用波次难度加成
            newEnemies.forEach(enemy => {
                enemy.speed *= config.speedMultiplier;
                enemy.fireRate = Math.floor(enemy.fireRate * config.fireRateMultiplier);
                if (enemy.vx) enemy.vx *= config.speedMultiplier;
                if (enemy.vy) enemy.vy *= config.speedMultiplier;
            });
            
            enemies.push(...newEnemies);
            wave++;
        }

        // 初始化游戏
        function init() {
            player.x = canvas.width / 2;
            player.y = canvas.height - 120;
            enemies = [];
            bullets = [];
            playerBullets = [];
            particles = [];
            score = 0;
            invincible = false;
            invincibleTimer = 0;
            lives = 3;
            maxLives = 4;
            lifeTimer = 0;
            energy = 0; // 重置能量
            boss = null;
            bossActive = false;
            bossTimer = 0;
            bossDefeated = 0;
            wave = 1;
            waveTimer = 0;
            running = true;

            title.style.display = 'none';
            death.style.display = 'none';
            ultimateBtn.style.display = 'block';
            updateUltimateButton(); // 更新大招按钮状态

            loop();
        }

        // 生成BOSS
        function spawnBoss() {
            bossTimer++;
            if (bossTimer < bossInterval || bossActive) return;
            bossTimer = 0;

            // 清空屏幕准备BOSS战
            bullets = [];
            enemies = [];
            
            // 按顺序循环BOSS
            const bossIndex = bossDefeated % bossTypes.length;
            const bossData = bossTypes[bossIndex];
            
            boss = {
                ...bossData,
                x: canvas.width / 2,
                y: -50,
                targetY: 100,
                entering: true,
                exiting: false,
                attackIndex: 0,
                attackTimer: 0,
                phase: 0,
                angle: 0
            };
            
            bossActive = true;
            wave = 1; // BOSS战后重置波次
        }

        // BOSS攻击逻辑 (9种专属攻击)
        function bossAttack(boss) {
            if (boss.entering || boss.exiting) return;
            
            boss.attackTimer++;
            boss.angle += 0.05;

            // 阶段变化时切换攻击模式
            const hpPercent = boss.hp / boss.maxHp;
            if (hpPercent < boss.phases[boss.phase] && boss.phase < boss.phases.length) {
                boss.phase++;
                boss.attackTimer = 0;
                // 阶段变化清屏
                bullets = [];
                createExplosion(boss.x, boss.y, 30);
            }

            // 攻击间隔随阶段缩短
            const attackInterval = Math.max(50, 110 - boss.phase * 25);
            if (boss.attackTimer < attackInterval) return;
            boss.attackTimer = 0;

            // 循环使用该BOSS的攻击
            const attack = boss.attacks[boss.attackIndex % boss.attacks.length];
            boss.attackIndex++;

            const dx = player.x - boss.x;
            const dy = player.y - boss.y;
            const angle = Math.atan2(dy, dx);

            switch (attack) {
                // BOSS1 攻击
                case "ringBarrage":
                    for (let i = 0; i < 14 + boss.phase * 5; i++) {
                        addBullet(boss.x, boss.y, i * Math.PI * 2 / (14 + boss.phase * 5), 3.2, boss.color, 4);
                    }
                    break;
                case "scatterStorm":
                    for (let i = -4; i <= 4; i++) {
                        addBullet(boss.x, boss.y, angle + i * 0.18, 4.2, boss.color, 3);
                    }
                    break;
                case "trackingSalvo":
                    for (let i = 0; i < 4 + boss.phase; i++) {
                        setTimeout(() => {
                            if (bossActive) addBullet(boss.x, boss.y, Math.atan2(player.y - boss.y, player.x - boss.x), 2.7, boss.color, 4, true, 160);
                        }, i * 180);
                    }
                    break;

                // BOSS2 攻击
                case "spiralDeath":
                    for (let i = 0; i < 4; i++) {
                        addBullet(boss.x, boss.y, boss.angle + i * Math.PI * 2 / 4, 3.7, boss.color, 4);
                        addBullet(boss.x, boss.y, boss.angle + Math.PI + i * Math.PI * 2 / 4, 3.7, boss.color, 4);
                    }
                    break;
                case "crossBurst":
                    for (let i = 0; i < 4; i++) {
                        const a = angle + i * Math.PI / 2;
                        for (let j = -2; j <= 2; j++) {
                            addBullet(boss.x, boss.y, a + j * 0.12, 4.2, boss.color, 3);
                        }
                    }
                    break;
                case "waveWall":
                    for (let i = 0; i < 10; i++) {
                        addBullet(boss.x - 180 + i * 40, boss.y, Math.PI / 2, 3.2, boss.color, 3, false, 0, false, true);
                    }
                    break;

                // BOSS3 攻击
                case "laserBeam":
                    // 激光预警
                    for (let i = 0; i < 40; i++) {
                        setTimeout(() => {
                            if (bossActive) {
                                bullets.push({
                                    x: boss.x,
                                    y: boss.y + i * 18,
                                    vx: 0,
                                    vy: 0,
                                    r: 10,
                                    color: 'rgba(255, 170, 0, 0.6)',
                                    laser: true,
                                    life: 70
                                });
                            }
                        }, i * 15);
                    }
                    break;
                case "explosiveRing":
                    for (let i = 0; i < 20; i++) {
                        addBullet(boss.x, boss.y, i * Math.PI * 2 / 20, 2.2, boss.color, 5, false, 0, true);
                    }
                    break;
                case "chaosBullet":
                    for (let i = 0; i < 10 + boss.phase * 5; i++) {
                        const randomAngle = Math.random() * Math.PI * 2;
                        addBullet(boss.x, boss.y, randomAngle, 2.5 + Math.random() * 2.5, boss.color, 3);
                    }
                    break;
            }
        }

        // 统一创建敌人子弹
        function addBullet(x, y, angle, speed, color, r, tracking=false, trackTime=0, delayed=false, wave=false) {
            bullets.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                r, color,
                tracking, trackTime,
                delayed, delayTimer: 55,
                wave, waveAngle: 0,
                baseVx: Math.cos(angle) * speed,
                baseVy: Math.sin(angle) * speed
            });
        }

        // 玩家射击
        function playerFire() {
            player.fireTimer++;
            if (player.fireTimer < player.fireRate) return;
            player.fireTimer = 0;

            // 东方标准3发直线弹幕
            playerBullets.push({ x: player.x - 8, y: player.y - player.visualR, vy: -9, r: 3, color: '#00ffff' });
            playerBullets.push({ x: player.x, y: player.y - player.visualR - 5, vy: -10, r: 3, color: '#00ffff' });
            playerBullets.push({ x: player.x + 8, y: player.y - player.visualR, vy: -9, r: 3, color: '#00ffff' });
        }

        // 更新所有子弹
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];

                // 激光子弹
                if (b.laser) {
                    b.life--;
                    if (b.life <= 0) {
                        bullets.splice(i, 1);
                    }
                    continue;
                }

                // 延迟爆炸弹
                if (b.delayed) {
                    b.delayTimer--;
                    if (b.delayTimer <= 0) {
                        for (let j = 0; j < 9; j++) {
                            addBullet(b.x, b.y, j * Math.PI / 4, 3.2, b.color, 3);
                        }
                        bullets.splice(i, 1);
                        continue;
                    }
                }

                // 追踪弹
                if (b.tracking && b.trackTime > 0) {
                    b.trackTime--;
                    const dx = player.x - b.x;
                    const dy = player.y - b.y;
                    const targetAngle = Math.atan2(dy, dx);
                    const currentAngle = Math.atan2(b.vy, b.vx);
                    let diff = targetAngle - currentAngle;
                    while (diff > Math.PI) diff -= 2 * Math.PI;
                    while (diff < -Math.PI) diff += 2 * Math.PI;
                    const turn = Math.sign(diff) * Math.min(Math.abs(diff), 0.04);
                    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                    b.vx = Math.cos(currentAngle + turn) * speed;
                    b.vy = Math.sin(currentAngle + turn) * speed;
                }

                // 波浪弹
                if (b.wave) {
                    b.waveAngle += 0.12;
                    const perpAngle = Math.atan2(b.baseVy, b.baseVx) + Math.PI / 2;
                    b.vx = b.baseVx + Math.cos(perpAngle) * Math.sin(b.waveAngle) * 1.8;
                    b.vy = b.baseVy + Math.sin(perpAngle) * Math.sin(b.waveAngle) * 1.8;
                }

                b.x += b.vx;
                b.y += b.vy;

                if (b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
                    bullets.splice(i, 1);
                }
            }

            // 更新玩家子弹
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                const b = playerBullets[i];
                b.y += b.vy;
                if (b.y < -20) playerBullets.splice(i, 1);
            }
        }

        // 更新大招按钮状态
        function updateUltimateButton() {
            if (cheatMode) {
                ultimateBtn.disabled = false;
            } else {
                ultimateBtn.disabled = energy < maxEnergy;
            }
        }

        // 神拳大招 (能量满才能放)
        function ultimate() {
            // 作弊模式无限大招，正常模式需要能量满
            if (!cheatMode && energy < maxEnergy) return;
            if (invincible) return;
            
            invincible = true;
            invincibleTimer = 120; // 2秒无敌
            bullets = [];

            // 对所有敌人造成伤害
            enemies.forEach(e => {
                e.hp -= 5;
                createExplosion(e.x, e.y, 8);
            });
            enemies = enemies.filter(e => e.hp > 0);

            // 对BOSS造成大量伤害
            if (boss && !boss.exiting) {
                boss.hp -= 120;
                createExplosion(boss.x, boss.y, 20);
            }

            // 消耗能量 (作弊模式不消耗)
            if (!cheatMode) {
                energy = 0;
                updateUltimateButton();
            }
        }

        // 创建爆炸粒子
        function createExplosion(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 25,
                    color: '#ff6600',
                    r: Math.random() * 4 + 2
                });
            }
        }

        // 碰撞检测
        function checkCollision() {
            // 玩家子弹打敌人
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                const pb = playerBullets[i];
                
                // 打普通敌人
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    const dx = pb.x - e.x;
                    const dy = pb.y - e.y;
                    if (Math.sqrt(dx * dx + dy * dy) < pb.r + e.r) {
                        e.hp--;
                        playerBullets.splice(i, 1);
                        if (e.hp <= 0) {
                            createExplosion(e.x, e.y, 12);
                            enemies.splice(j, 1);
                            
                            // 击杀获得能量
                            if (e.color === '#ff0000') {
                                score += 500;
                                energy = Math.min(energy + eliteEnemyEnergy, maxEnergy);
                            } else {
                                score += 100;
                                energy = Math.min(energy + normalEnemyEnergy, maxEnergy);
                            }
                            updateUltimateButton(); // 更新大招按钮
                        }
                        break;
                    }
                }

                // 打BOSS
                if (boss && !boss.entering && !boss.exiting) {
                    const dx = pb.x - boss.x;
                    const dy = pb.y - boss.y;
                    if (Math.sqrt(dx * dx + dy * dy) < pb.r + boss.r) {
                        boss.hp--;
                        playerBullets.splice(i, 1);
                        score += 10;
                        
                        // BOSS死亡
                        if (boss.hp <= 0) {
                            bossDefeat();
                        }
                    }
                }
            }

            // 玩家被击中
            if (invincible) return;
            for (const b of bullets) {
                const dx = b.x - player.x;
                const dy = b.y - player.y;
                if (Math.sqrt(dx * dx + dy * dy) < b.r + player.hitboxR) {
                    playerHit();
                    return;
                }
            }

            for (const e of enemies) {
                const dx = e.x - player.x;
                const dy = e.y - player.y;
                if (Math.sqrt(dx * dx + dy * dy) < e.r + player.hitboxR) {
                    playerHit();
                    return;
                }
            }

            if (boss && !boss.entering && !boss.exiting) {
                const dx = boss.x - player.x;
                const dy = boss.y - player.y;
                if (Math.sqrt(dx * dx + dy * dy) < boss.r + player.hitboxR) {
                    playerHit();
                    return;
                }
            }
        }

        // BOSS击败处理
        function bossDefeat() {
            boss.exiting = true;
            createExplosion(boss.x, boss.y, 50);
            bullets = [];
            
            // 奖励：生命上限+1，当前生命+1，额外加50能量
            maxLives++;
            lives = Math.min(lives + 1, maxLives);
            energy = Math.min(energy + 50, maxEnergy);
            score += 5000;
            bossDefeated++;
            updateUltimateButton();

            // BOSS退场动画
            setTimeout(() => {
                boss = null;
                bossActive = false;
                bossTimer = 0;
            }, 1500);
        }

        // 玩家被击中处理
        function playerHit() {
            if (cheatMode) return;
            
            lives--;
            if (lives <= 0) {
                gameOver();
                return;
            }

            bullets = [];
            invincible = true;
            invincibleTimer = 90;
            createExplosion(player.x, player.y, 20);
        }

        // 游戏结束
        function gameOver() {
            running = false;
            death.style.display = 'flex';
            ultimateBtn.style.display = 'none';
        }

        // 更新游戏逻辑
        function update() {
            if (!running) return;

            spawnWave();
            spawnBoss();
            playerFire();

            // 更新普通敌人
            enemies.forEach(e => {
                // 特殊移动逻辑
                if (e.vx) e.x += e.vx;
                if (e.vy) e.y += e.vy;
                if (!e.vx && !e.vy) e.y += e.speed;
                
                // 边界反弹
                if (e.x < e.r || e.x > canvas.width - e.r) {
                    e.vx = -e.vx;
                }

                // 普通敌人攻击逻辑
                e.fireTimer++;
                if (e.fireTimer >= e.fireRate) {
                    e.fireTimer = 0;
                    const angle = Math.atan2(player.y - e.y, player.x - e.x);
                    switch (e.attack) {
                        case 'straight': addBullet(e.x, e.y, angle, 4.2, e.color, 4); break;
                        case 'scatter3':
                            for (let i = -1; i <= 1; i++) addBullet(e.x, e.y, angle + i * 0.32, 3.7, e.color, 3);
                            break;
                        case 'spiral':
                            e.angle += 0.65;
                            addBullet(e.x, e.y, e.angle, 3.2, e.color, 5);
                            break;
                        case 'tracking': addBullet(e.x, e.y, angle, 2.4, e.color, 4, true, 130); break;
                        case 'ring5':
                            for (let i = 0; i < 5; i++) addBullet(e.x, e.y, angle + i * Math.PI * 2 / 5, 3.2, e.color, 3);
                            break;
                        case 'cross':
                            addBullet(e.x, e.y, angle, 3.7, e.color, 4);
                            addBullet(e.x, e.y, angle + Math.PI / 2, 3.7, e.color, 4);
                            addBullet(e.x, e.y, angle - Math.PI / 2, 3.7, e.color, 4);
                            break;
                        case 'delayed': addBullet(e.x, e.y, angle, 1.7, e.color, 6, false, 0, true); break;
                        case 'wave': addBullet(e.x, e.y, angle, 3.4, e.color, 3, false, 0, false, true); break;
                    }
                }
            });
            enemies = enemies.filter(e => e.y < canvas.height + 50 && e.x > -50 && e.x < canvas.width + 50);

            // 更新BOSS
            if (boss) {
                if (boss.entering) {
                    boss.y += 2;
                    if (boss.y >= boss.targetY) boss.entering = false;
                } else if (boss.exiting) {
                    boss.y -= 3;
                } else {
                    // BOSS左右移动
                    boss.x += Math.sin(Date.now() / 800) * 1.8;
                    boss.x = Math.max(boss.r + 20, Math.min(canvas.width - boss.r - 20, boss.x));
                    bossAttack(boss);
                }
            }

            updateBullets();

            // 更新粒子
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vx *= 0.96;
                p.vy *= 0.96;
            });
            particles = particles.filter(p => p.life > 0);

            // 无敌时间
            if (invincibleTimer > 0 && !cheatMode) {
                invincibleTimer--;
                if (invincibleTimer <= 0) invincible = false;
            }

            // 自动加命
            lifeTimer++;
            if (lifeTimer >= lifeInterval && lives < maxLives) {
                lifeTimer = 0;
                lives++;
            }

            checkCollision();
            score++;
        }

        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!running) return;

            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '20px sans-serif';
            ctx.fillText(`分数: ${score}`, 20, 30);
            ctx.fillText(`波次: ${wave}`, 20, 90);
            
            // 生命显示
            ctx.fillText(`生命: ${lives}/${maxLives}`, 20, 60);
            for (let i = 0; i < lives; i++) {
                ctx.beginPath();
                ctx.arc(130 + i * 25, 55, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ff3333';
                ctx.fill();
            }

            // 大招能量条
            ctx.fillStyle = '#333';
            ctx.fillRect(20, 105, 200, 15);
            ctx.fillStyle = '#ff6600';
            ctx.fillRect(20, 105, 200 * (energy / maxEnergy), 15);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(20, 105, 200, 15);
            ctx.fillStyle = '#fff';
            ctx.fillText(`能量: ${energy}/${maxEnergy}`, 230, 118);

            // BOSS血条
            if (boss && !boss.exiting) {
                ctx.fillStyle = '#333';
                ctx.fillRect(50, 140, canvas.width - 100, 20);
                ctx.fillStyle = boss.color;
                ctx.fillRect(50, 140, (canvas.width - 100) * (boss.hp / boss.maxHp), 20);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(50, 140, canvas.width - 100, 20);
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText(boss.name, canvas.width / 2, 135);
                ctx.textAlign = 'left';
            }

            // 敌人
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                // 精英怪边框
                if (e.color === '#ff0000') {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                // 血条
                if (e.hp < 5) {
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(e.x - 15, e.y - e.r - 8, 30 * (e.hp / (e.color === '#ff0000' ? 8 : 3)), 3);
                }
            });

            // BOSS
            if (boss) {
                ctx.beginPath();
                ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI * 2);
                ctx.fillStyle = boss.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 子弹
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
            });

            // 玩家子弹
            playerBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
            });

            // 粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 25;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // 玩家
            if (!invincible || Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.visualR, 0, Math.PI * 2);
                ctx.fillStyle = invincible ? '#ff6600' : '#ffffff';
                ctx.fill();
            }

            // 判定点
            if (showHitbox) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.hitboxR, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0000';
                ctx.fill();
            }

            // 无敌光环
            if (invincible) {
                ctx.strokeStyle = 'rgba(255, 100, 0, 0.6)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 45 + Math.sin(Date.now() / 80) * 8, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // 游戏主循环
        function loop() {
            update();
            draw();
            if (running) requestAnimationFrame(loop);
        }

        // 触摸/鼠标控制
        function handleStart(e) {
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            const x = t.clientX - rect.left;
            const y = t.clientY - rect.top;

            const dx = x - player.x;
            const dy = y - player.y;
            if (Math.sqrt(dx * dx + dy * dy) < player.visualR * 2.5) {
                player.dragging = true;
            }
        }

        function handleMove(e) {
            e.preventDefault();
            if (!player.dragging) return;

            const t = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            player.x = t.clientX - rect.left;
            player.y = t.clientY - rect.top;

            player.x = Math.max(player.visualR, Math.min(canvas.width - player.visualR, player.x));
            player.y = Math.max(player.visualR, Math.min(canvas.height - player.visualR, player.y));
        }

        function handleEnd() {
            player.dragging = false;
        }

        // 事件绑定
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('touchend', handleEnd);

        startBtn.addEventListener('click', () => {
            cheatMode = cheatCheck.checked;
            showHitbox = hitboxCheck.checked;
            init();
        });

        restartBtn.addEventListener('click', init);
        ultimateBtn.addEventListener('click', ultimate);
    </script>
</body>
</html>
